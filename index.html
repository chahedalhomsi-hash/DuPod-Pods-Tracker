<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DuPod — Pod Passport</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --yellow:#FCCC00; --blue:#74B2CB; --grey:#65666A; --border:#e8e8e6; --bg:#f4f4f2; --white:#ffffff; --text:#1e1e1e; --text-soft:#65666A; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); font-family:'DM Sans',sans-serif; color:var(--text); min-height:100vh; }
  .header { background:var(--white); border-bottom:3px solid var(--yellow); padding:12px 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; box-shadow:0 2px 12px rgba(0,0,0,0.06); }
  .header img { height:32px; display:block; }
  .header-tag { background:var(--yellow); color:var(--text); font-family:'DM Mono',monospace; font-size:9px; font-weight:500; padding:4px 10px; letter-spacing:1.5px; text-transform:uppercase; }
  .main { max-width:480px; margin:0 auto; padding:0 0 40px; }
  .pod-hero { background:var(--white); padding:20px; border-bottom:1px solid var(--border); }
  .pod-tag { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:2px; color:var(--blue); text-transform:uppercase; margin-bottom:4px; }
  .pod-serial { font-family:'DM Mono',monospace; font-size:22px; font-weight:500; color:var(--text); letter-spacing:1.5px; margin-bottom:2px; }
  .pod-project { font-size:13px; color:var(--text-soft); }
  .pod-project strong { color:var(--text); font-weight:600; }
  .section { background:var(--white); margin-top:2px; animation:fadeUp 0.4s ease both; }
  .section:nth-child(2){animation-delay:0.05s} .section:nth-child(3){animation-delay:0.1s}
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .section-header { padding:14px 20px 12px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:8px; }
  .section-dot { width:8px; height:8px; background:var(--yellow); flex-shrink:0; }
  .section-title { font-family:'DM Mono',monospace; font-size:10px; color:var(--text-soft); letter-spacing:2px; text-transform:uppercase; }
  .drawings-grid { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--border); }
  .drawing-cell { background:var(--white); aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .drawing-placeholder { width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; background:#fafaf9; }
  .drawing-placeholder svg { opacity:0.2; }
  .drawing-placeholder span { font-family:'DM Mono',monospace; font-size:9px; color:#bbb; letter-spacing:1px; }
  .drawing-img { width:100%; height:100%; object-fit:contain; padding:10px; }
  .material-row { padding:14px 20px; border-bottom:1px solid var(--border); }
  .material-row:last-child { border-bottom:none; }
  .material-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
  .material-name { font-size:13px; font-weight:600; color:var(--text); }
  .material-mfr { font-family:'DM Mono',monospace; font-size:10px; color:var(--blue); }
  .material-spec { font-family:'DM Mono',monospace; font-size:10px; color:var(--text-soft); line-height:1.5; }
  .footer { background:var(--white); border-top:2px solid var(--yellow); padding:12px 20px; display:flex; justify-content:space-between; margin-top:2px; }
  .footer-text { font-family:'DM Mono',monospace; font-size:9px; color:#ccc; }
  .error-state { text-align:center; padding:60px 20px; }
  .error-icon { font-size:40px; margin-bottom:14px; opacity:0.3; }
  .error-title { font-family:'DM Mono',monospace; font-size:12px; color:var(--grey); margin-bottom:6px; }
</style>
</head>

function getPodType(serial) {
  const parts = serial.toUpperCase().split('-');
  if (parts.length >= 2) return parts[0] + '-' + parts[1];
  return null;
}

function init() {
  const podId = new URLSearchParams(window.location.search).get('pod');
  if (!podId) {
    document.getElementById('main').innerHTML = `<div class="error-state"><div class="error-icon">⚠️</div><div class="error-title">No pod specified</div><div style="font-size:12px;color:var(--grey)">Scan a pod QR code to view its passport</div></div>`;

  const podType = getPodType(serial);
  const materials = podType ? MATERIALS[podType] : null;
  const drawings = podType ? DRAWINGS[podType] : null;
  const views = ['TOP', 'FRONT', 'SIDE', 'BOTTOM'];

  const drawingCells = views.map(view => {
    const imgUrl = drawings && drawings[view.toLowerCase()];
    return `<div class="drawing-cell">${imgUrl
      ? `<img class="drawing-img" src="${imgUrl}" alt="${view}">`
      : `<div class="drawing-placeholder">

        </div>`
    }</div>`;
  }).join('');

  const materialRows = materials && materials.length
    ? materials.map(m => `
        <div class="material-row">
          <div class="material-top">
            <span class="material-name">${m.material}</span>
            <span class="material-mfr">${m.manufacturer}</span>
          </div>
          <div class="material-spec">${m.spec}</div>

    : '<div style="padding:20px;font-family:DM Mono,monospace;font-size:11px;color:#bbb;">No material data for this pod type</div>';

      <div class="pod-serial">${serial}</div>

}
