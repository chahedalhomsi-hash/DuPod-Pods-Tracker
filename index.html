<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DuPod Pod Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root { --yellow:#FCCC00; --blue:#74B2CB; --grey:#65666A; --light-grey:#f0f0ef; --border:#e0e0de; --text:#2a2a2a; --text-light:#65666A; --white:#ffffff; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--light-grey); color:var(--text); font-family:"IBM Plex Sans",sans-serif; min-height:100vh; }
  .header { background:var(--white); border-bottom:3px solid var(--yellow); padding:14px 20px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
  .logo img { height:36px; display:block; }
  .header-tag { font-family:"IBM Plex Mono",monospace; font-size:10px; letter-spacing:2px; color:var(--text-light); text-transform:uppercase; }
  .main { max-width:480px; margin:0 auto; padding:30px 16px 40px; }
  .loading-state { text-align:center; padding:60px 20px; }
  .spinner { width:36px; height:36px; border:3px solid var(--border); border-top-color:var(--yellow); border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .loading-text { font-family:"IBM Plex Mono",monospace; font-size:12px; color:var(--grey); letter-spacing:1px; }
  .error-state { text-align:center; padding:60px 20px; display:none; }
  .error-icon { font-size:40px; margin-bottom:14px; }
  .error-title { font-family:"IBM Plex Mono",monospace; font-size:13px; color:#b91c1c; margin-bottom:8px; }
  .error-sub { font-size:12px; color:var(--grey); }
  .pod-card { display:none; animation:fadeUp 0.3s ease; }
  .pod-card.visible { display:block; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
  .pod-header { background:var(--white); border-top:4px solid var(--yellow); padding:20px; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
  .pod-serial { font-family:"IBM Plex Mono",monospace; font-size:18px; font-weight:600; color:var(--text); letter-spacing:1px; margin-bottom:3px; }
  .pod-project { font-size:12px; color:var(--text-light); }
  .pod-project span { color:var(--text); font-weight:600; }
  .status-row { background:var(--white); border-top:1px solid var(--border); padding:12px 20px; display:flex; align-items:center; justify-content:space-between; }
  .status-label-sm { font-family:"IBM Plex Mono",monospace; font-size:10px; color:var(--grey); letter-spacing:1.5px; text-transform:uppercase; }
  .badge { font-family:"IBM Plex Mono",monospace; font-size:10px; font-weight:600; padding:3px 10px; letter-spacing:1px; text-transform:uppercase; }
  .badge.closed { background:#e8faf0; color:#15803d; border:1px solid #bbf7d0; }
  .badge.open { background:#fff7ed; color:#c2410c; border:1px solid #fed7aa; }
  .progress-block { background:var(--white); border-top:1px solid var(--border); padding:14px 20px; margin-bottom:2px; }
  .progress-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .progress-title { font-family:"IBM Plex Mono",monospace; font-size:10px; color:var(--grey); letter-spacing:1.5px; text-transform:uppercase; }
  .progress-pct { font-family:"IBM Plex Mono",monospace; font-size:13px; font-weight:600; color:var(--text); }
  .progress-track { height:5px; background:var(--border); border-radius:3px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--yellow); border-radius:3px; width:0%; transition:width 1s ease; }
  .timeline-wrap { background:var(--white); padding:20px; box-shadow:0 1px 4px rgba(0,0,0,0.04); }
  .timeline-title { font-family:"IBM Plex Mono",monospace; font-size:10px; color:var(--grey); letter-spacing:2px; text-transform:uppercase; margin-bottom:18px; padding-bottom:10px; border-bottom:1px solid var(--border); }
  .timeline { position:relative; padding-left:28px; }
  .timeline::before { content:""; position:absolute; left:9px; top:10px; bottom:10px; width:2px; background:var(--border); }
  .tl-item { position:relative; padding:10px 0 10px 20px; display:flex; align-items:flex-start; justify-content:space-between; gap:12px; border-bottom:1px solid #f4f4f3; }
  .tl-item:last-child { border-bottom:none; }
  .tl-dot { position:absolute; left:-19px; top:50%; transform:translateY(-50%); width:14px; height:14px; border-radius:50%; border:2px solid var(--border); background:var(--white); z-index:1; }
  .tl-dot.done { background:var(--yellow); border-color:var(--yellow); }
  .tl-dot.done::after { content:""; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:5px; height:5px; border-radius:50%; background:var(--white); }
  .tl-left { flex:1; min-width:0; }
  .tl-seq { font-family:"IBM Plex Mono",monospace; font-size:9px; color:#bbb; margin-bottom:1px; letter-spacing:1px; }
  .tl-name { font-size:13px; font-weight:500; color:var(--text); }
  .tl-name.pending { color:var(--text-light); font-weight:400; }
  .tl-date { font-family:"IBM Plex Mono",monospace; font-size:11px; color:var(--blue); flex-shrink:0; font-weight:500; padding-top:2px; }
  .tl-date.pending { color:#ccc; }
  .pod-footer { background:#f8f8f7; border-top:2px solid var(--yellow); padding:10px 20px; display:flex; justify-content:space-between; margin-top:2px; }
  .footer-text { font-family:"IBM Plex Mono",monospace; font-size:10px; color:#bbb; }
</style>
</head>

  <div class="header-tag">Pod Tracker</div>
</div>
<div class="main">
  <div class="loading-state" id="loadingState">
    <div class="spinner"></div>
    <div class="loading-text">Loading pod data...</div>
  </div>
  <div class="error-state" id="errorState">
    <div class="error-icon">⚠️</div>
    <div class="error-title" id="errorTitle">Pod not found</div>
    <div class="error-sub" id="errorSub"></div>
  </div>
  <div class="pod-card" id="podCard"></div>
</div>
<script>
  const GITHUB_USER = "chahedalhomsi-hash";
  const GITHUB_REPO = "DuPod-Pods-Tracker";
  const EXCEL_FILE = "Operations%20Output.xlsx";

  const ALL_OPS = [
    "Slab Added in Dupod Factory","Waterproofing","Tilling/Marble Works",
    "POD Assembly","First Phase MEP","Paint/Plaster Works","Joinery Works",
    "Second Phase MEP","Glass Works","Silicon & Snagging","QC Final Inspection","POD Packing"
  ];

  function getPodFromURL() {
    return new URLSearchParams(window.location.search).get("pod");
  }

  async function fetchExcel() {
    // Use raw.githubusercontent.com — no token needed for public repos
    const url = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${EXCEL_FILE}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error("Could not fetch Excel file (status " + res.status + ")");
    return await res.arrayBuffer();
  }

  function parseExcel(buffer, targetSerial) {
    const wb = XLSX.read(buffer, { type:"array", cellDates:true });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { header:1, raw:true });

    let headerIdx = -1;
    for (let i = 0; i < rows.length; i++) {
      if (rows[i].includes("Serial Number")) { headerIdx = i; break; }
    }
    if (headerIdx === -1) throw new Error("Header row not found in Excel");

    const headers = rows[headerIdx];
    const col = {};
    headers.forEach((h,i) => { col[h] = i; });

    const target = targetSerial.toUpperCase();
    let pod = null;

    for (let i = headerIdx + 1; i < rows.length; i++) {
      const row = rows[i];
      if (!row || !row[col["Serial Number"]]) continue;
      const serial = String(row[col["Serial Number"]]).trim().toUpperCase();
      if (serial !== target) continue;
      if (!pod) {
        pod = {
          serial: String(row[col["Serial Number"]]).trim(),
          projectNumber: row[col["Project Number"]] || "",
          projectName: row[col["Project Name"]] || "",
          status: row[col["Work Order Status"]] || "",
          ops: {}
        };
      }
      const opName = row[col["Operation Name"]] || "";
      const txDate = row[col["Transaction Date"]] || "";
      if (opName && txDate) pod.ops[opName] = txDate;
    }
    return pod;
  }

  function formatDate(d) {
    if (!d) return "—";
    try {
      let dt;
      if (typeof d === "number") {
        // Excel serial date — convert using SheetJS
        const dateObj = XLSX.SSF.parse_date_code(d);
        dt = new Date(dateObj.y, dateObj.m - 1, dateObj.d);
      } else if (d instanceof Date) {
        dt = d;
      } else {
        return "—";
      }
      if (isNaN(dt.getTime())) return "—";
      return dt.toLocaleDateString("en-GB", {day:"2-digit", month:"short", year:"numeric"});
    } catch(e) { return "—"; }
  }

  function showError(title, sub) {
    document.getElementById("loadingState").style.display = "none";
    document.getElementById("errorState").style.display = "block";
    document.getElementById("errorTitle").textContent = title;
    document.getElementById("errorSub").textContent = sub;
  }

  function renderPod(pod) {
    document.getElementById("loadingState").style.display = "none";
    const podCard = document.getElementById("podCard");
    const completedOps = ALL_OPS.filter(op => pod.ops[op]);
    const pct = Math.round((completedOps.length / ALL_OPS.length) * 100);
    const statusClass = (pod.status||"").toLowerCase()==="closed" ? "closed" : "open";

    const items = ALL_OPS.map((op,idx) => {
      const date = pod.ops[op]; const done = !!date;
      return `<div class="tl-item">
        <div class="tl-dot ${done?"done":""}"></div>
        <div class="tl-left">
          <div class="tl-seq">STEP ${String(idx+1).padStart(2,"0")}</div>
          <div class="tl-name ${done?"":"pending"}">${op}</div>
        </div>
        <div class="tl-date ${done?"":"pending"}">${date?formatDate(date):"—"}</div>
      </div>`;
    }).join("");

    podCard.innerHTML = `
      <div class="pod-header">
        <div class="pod-serial">${pod.serial}</div>
        <div class="pod-project">Project: <span>${pod.projectName}</span> &nbsp;·&nbsp; ${pod.projectNumber}</div>
      </div>
      <div class="status-row">
        <span class="status-label-sm">Work Order Status</span>
        <span class="badge ${statusClass}">${pod.status||"Unknown"}</span>
      </div>
      <div class="progress-block">
        <div class="progress-top">
          <span class="progress-title">Production Progress</span>
          <span class="progress-pct">${completedOps.length} / ${ALL_OPS.length} &nbsp;<span style="color:var(--yellow)">${pct}%</span></span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="pFill"></div></div>
      </div>
      <div class="timeline-wrap">
        <div class="timeline-title">Production Timeline · ${completedOps.length} complete</div>
        <div class="timeline">${items}</div>
      </div>
      <div class="pod-footer">
        <span class="footer-text">DuPod · AN AMANA COMPANY</span>
        <span class="footer-text">${new Date().toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"})}</span>
      </div>`;

    podCard.classList.add("visible");
    setTimeout(() => { const f=document.getElementById("pFill"); if(f) f.style.width=pct+"%"; }, 80);
  }

  async function init() {
    const podId = getPodFromURL();
    if (!podId) { showError("No pod specified", "Scan a pod barcode to view its dashboard."); return; }
    try {
      const buffer = await fetchExcel();
      const pod = parseExcel(buffer, podId);
      if (!pod) { showError("Pod not found", `"${podId}" was not found in the current dataset.`); return; }
      renderPod(pod);
    } catch(err) {
      showError("Failed to load data", err.message);
    }
  }

  init();
</script>
</body>
</html>
